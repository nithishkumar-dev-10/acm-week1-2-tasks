mode: full
sample_size: 500



paths:

  raw:
    sample: "data/raw/WA_Fn-UseC_-HR-Employee-Attrition.csv"
    full: "data/raw/WA_Fn-UseC_-HR-Employee-Attrition.csv"

  processed:
    sample: "data/processed/processed_sample.csv"
    full: "data/processed/processed_full.csv"

  splits:
    train: "data/splits/train.csv"
    test: "data/splits/test.csv"

  models:
    logistic: "artifacts/models/logistic_regression.pkl"
    random_forest: "artifacts/models/random_forest.pkl"
    xgboost: "artifacts/models/xgboost.pkl"

  artifacts:
    preprocessor: "artifacts/preprocessor.pkl"
    feature_columns: "artifacts/feature_columns.pkl"

  reports:
    figures: "reports/figures"
    metrics: "reports/metrics"
    summary: "reports/summary.md"

  logs:
    pipeline: "logs/pipeline.log"




split:
  test_size: 0.20
  random_state: 42
  stratify: true



smote:
  enabled: true
  random_state: 42




logging:
  level: INFO