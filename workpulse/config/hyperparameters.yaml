logistic_regression:
  search: "grid"
  cv: 5
  scoring: "f1_macro"
  param_grid:
    C:            [0.01, 0.1, 1, 10]
    penalty:      ["l1", "l2"]
    solver:       ["liblinear"]
    class_weight: ["balanced"]

random_forest:
  search: "random"
  cv: 5
  n_iter: 30
  scoring: "f1_macro"
  n_jobs: -1
  param_distributions:
    n_estimators:      [200, 300, 400]
    max_depth:         [6, 8, 10, null]
    min_samples_split: [2, 5]
    min_samples_leaf:  [1, 2]
    max_features:      ["sqrt", "log2"]
    class_weight:      ["balanced", "balanced_subsample"]

xgboost:
  search: "grid"
  cv: 5
  scoring: "f1_macro"
  n_jobs: -1
  param_grid:
    n_estimators:     [200, 300]
    learning_rate:    [0.01, 0.05]
    max_depth:        [5, 6]
    subsample:        [0.7, 0.8]
    colsample_bytree: [0.6, 0.7]
    min_child_weight: [3]
    gamma:            [0, 0.1]