

logistic_regression:
  search: "grid"
  cv_folds: 5
  scoring: "f1_macro"
  params:
    C:          [0.01, 0.1, 1, 10]
    penalty:    ["l1", "l2"]
    solver:     ["liblinear"]
    max_iter:   [1000]

random_forest:
  search: "random"
  cv_folds: 5
  n_iter: 30
  scoring: "f1_macro"
  params:
    n_estimators:     [100, 200, 300, 400, 500]
    max_depth:        [5, 10, 15, 20, 30, null]
    min_samples_split:[2, 5, 10]
    min_samples_leaf: [1, 2, 4]
    class_weight:     ["balanced", null]

xgboost:
  search: "random"
  cv_folds: 5
  n_iter: 30
  scoring: "f1_macro"
  params:
    n_estimators:   [100, 200, 300, 400, 500]
    learning_rate:  [0.01, 0.05, 0.1, 0.2, 0.3]
    max_depth:      [3, 5, 7, 10]
    subsample:      [0.6, 0.7, 0.8, 0.9, 1.0]
    colsample_bytree:[0.6, 0.7, 0.8, 1.0]
    scale_pos_weight:[1, 2, 3]     # handles imbalance in XGB
